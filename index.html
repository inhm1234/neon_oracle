<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>오늘의 운세코드</title>

  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="./style.css"/>
</head>

<body>

<canvas id="matrix"></canvas>
<div class="background-glow"></div>

<main class="container">

  <div class="brand-label">AI ORACLE FORTUNE SYSTEM</div>

  <h1 class="title" data-text="오늘의 운세코드">오늘의 운세코드</h1>

  <p class="subtitle">
    생년월일과 태어난 시간을 바탕으로 오늘의 운세 흐름을 분석합니다.
  </p>

  <section class="input-card">
    <form id="fortuneForm">

      <div class="form-grid">

        <label class="field">
          <span>이름 또는 닉네임</span>
          <input id="userName" type="text" placeholder="선택 입력" autocomplete="name" />
        </label>

        <label class="field">
          <span>성별</span>
          <select id="gender">
            <option value="none">선택 안 함</option>
            <option value="male">남성</option>
            <option value="female">여성</option>
          </select>
        </label>

        <label class="field wide">
          <span>생년월일</span>
          <input id="birthDate" type="date" min="1900-01-01" max="2099-12-31" required />
        </label>

        <label class="field wide">
          <span>태어난 시간</span>
          <select id="birthTime">
            <option value="unknown">태어난 시간 모름</option>
            <option value="ja">자시 23:00 ~ 00:59</option>
            <option value="chuk">축시 01:00 ~ 02:59</option>
            <option value="in">인시 03:00 ~ 04:59</option>
            <option value="myo">묘시 05:00 ~ 06:59</option>
            <option value="jin">진시 07:00 ~ 08:59</option>
            <option value="sa">사시 09:00 ~ 10:59</option>
            <option value="oh">오시 11:00 ~ 12:59</option>
            <option value="mi">미시 13:00 ~ 14:59</option>
            <option value="shin">신시 15:00 ~ 16:59</option>
            <option value="yu">유시 17:00 ~ 18:59</option>
            <option value="sul">술시 19:00 ~ 20:59</option>
            <option value="hae">해시 21:00 ~ 22:59</option>
          </select>
        </label>

      </div>

      <p class="notice">
        현재는 양력 생년월일 기준의 간이 분석입니다. 정밀 만세력, 음력 변환, 절기 기준 사주 계산은 추후 확장할 수 있습니다.
      </p>

      <button id="analyzeBtn" type="submit">
        AI 운세 분석하기
      </button>

    </form>
  </section>

  <div id="statusText" class="status-text">
    정보를 입력하면 오늘의 운세코드를 분석합니다.
  </div>

  <section id="resultCard" class="result-card hidden">

    <div class="result-top">
      <div>
        <span>분석 코드</span>
        <strong id="analysisCode">#----</strong>
      </div>

      <div>
        <span>분석 완성도</span>
        <strong id="completeRate">--%</strong>
      </div>
    </div>

    <h2 id="resultTitle">오늘의 운세 분석 결과</h2>

    <div id="baseInfo" class="base-info"></div>

    <div class="fortune-grid">
      <article class="fortune-section">
        <h3>오늘의 총운</h3>
        <p id="totalFortune"></p>
      </article>

      <article class="fortune-section">
        <h3>재물운</h3>
        <p id="moneyFortune"></p>
      </article>

      <article class="fortune-section">
        <h3>연애·인간관계운</h3>
        <p id="loveFortune"></p>
      </article>

      <article class="fortune-section">
        <h3>일·사업운</h3>
        <p id="workFortune"></p>
      </article>

      <article class="fortune-section">
        <h3>건강운</h3>
        <p id="healthFortune"></p>
      </article>

      <article class="fortune-section warning">
        <h3>오늘 조심할 점</h3>
        <p id="cautionFortune"></p>
      </article>
    </div>

    <div class="lucky-box">
      <h3>오늘의 행운 요소</h3>
      <div id="luckyItems" class="lucky-items"></div>
    </div>

    <div class="advice-box">
      <span>오늘의 한 줄 조언</span>
      <p id="finalAdvice"></p>
    </div>

  </section>

</main>

<script src="./app.js"></script>

</body>
</html>
