<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>오늘의 운세코드 V7.0</title>

  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="./style.css?v=70"/>
</head>

<body>

<canvas id="matrix"></canvas>
<div class="background-glow"></div>

<main class="container">

  <div class="brand-label">AI ORACLE FORTUNE SYSTEM</div>

  <h1 class="title" data-text="오늘의 운세코드">오늘의 운세코드</h1>

  <p class="subtitle">
    생년월일과 태어난 시간을 바탕으로 오늘의 운세 흐름을 분석합니다.
  </p>

  <section class="input-card">
    <form id="fortuneForm">

      <div class="form-grid">

        <label class="field">
          <span>이름 또는 닉네임</span>
          <input id="userName" type="text" placeholder="예: 민수" autocomplete="name" />
        </label>

        <label class="field">
          <span>성별</span>
          <select id="gender">
            <option value="none">선택 안 함</option>
            <option value="male">남성</option>
            <option value="female">여성</option>
          </select>
        </label>

        <label class="field">
          <span>달력 기준</span>
          <select id="calendarType">
            <option value="solar">양력</option>
            <option value="lunar">음력</option>
          </select>
        </label>

        <label class="field">
          <span>태어난 연도</span>
          <input id="birthYear" type="number" placeholder="예: 1989" min="1900" max="2099" required />
        </label>

        <label class="field">
          <span>태어난 월</span>
          <select id="birthMonth" required>
            <option value="">월 선택</option>
            <option value="1">1월</option>
            <option value="2">2월</option>
            <option value="3">3월</option>
            <option value="4">4월</option>
            <option value="5">5월</option>
            <option value="6">6월</option>
            <option value="7">7월</option>
            <option value="8">8월</option>
            <option value="9">9월</option>
            <option value="10">10월</option>
            <option value="11">11월</option>
            <option value="12">12월</option>
          </select>
        </label>

        <label class="field">
          <span>태어난 일</span>
          <select id="birthDay" required>
            <option value="">일 선택</option>
          </select>
        </label>

        <label class="field wide">
          <span>태어난 시간</span>
          <select id="birthTime">
            <option value="unknown">태어난 시간 모름</option>
            <option value="ja">자시 23:00 ~ 00:59</option>
            <option value="chuk">축시 01:00 ~ 02:59</option>
            <option value="in">인시 03:00 ~ 04:59</option>
            <option value="myo">묘시 05:00 ~ 06:59</option>
            <option value="jin">진시 07:00 ~ 08:59</option>
            <option value="sa">사시 09:00 ~ 10:59</option>
            <option value="oh">오시 11:00 ~ 12:59</option>
            <option value="mi">미시 13:00 ~ 14:59</option>
            <option value="shin">신시 15:00 ~ 16:59</option>
            <option value="yu">유시 17:00 ~ 18:59</option>
            <option value="sul">술시 19:00 ~ 20:59</option>
            <option value="hae">해시 21:00 ~ 22:59</option>
          </select>
        </label>

      </div>

      <p class="notice">
        현재 버전은 정밀 만세력 계산이 아닌, 전통 명리학의 기본 요소인 천간·지지·오행·십이지·시지 흐름을 참고한 간이 분석입니다.
      </p>

      <button id="analyzeBtn" type="submit">
        AI 운세 분석하기
      </button>

    </form>
  </section>

  <div id="statusText" class="status-text">정보를 입력하면 오늘의 운세코드를 분석합니다.</div>

  <section id="resultCard" class="result-card hidden">

    <div class="result-top">
      <div>
        <span class="small-label">ANALYSIS CODE</span>
        <strong id="analysisCode">#----</strong>
      </div>
      <div>
        <span class="small-label">입력 완성도</span>
        <strong id="confidenceText">--%</strong>
      </div>
    </div>

    <h2 id="resultTitle">오늘의 운세 분석 결과</h2>

    <div id="baseInfo" class="base-info"></div>

    <div class="fortune-grid">

      <article class="fortune-section">
        <h3>오늘의 총운</h3>
        <p id="totalFortune"></p>
      </article>

      <article class="fortune-section">
        <h3>재물운</h3>
        <p id="moneyFortune"></p>
      </article>

      <article class="fortune-section">
        <h3>연애·인간관계운</h3>
        <p id="loveFortune"></p>
      </article>

      <article class="fortune-section">
        <h3>일·사업운</h3>
        <p id="workFortune"></p>
      </article>

      <article class="fortune-section">
        <h3>건강운</h3>
        <p id="healthFortune"></p>
      </article>

      <article class="fortune-section warning-section">
        <h3>오늘 조심할 점</h3>
        <p id="cautionFortune"></p>
      </article>

    </div>

    <div class="lucky-box">
      <h3>오늘의 행운 요소</h3>
      <div id="luckyItems" class="lucky-items"></div>
    </div>

    <div class="advice-box">
      <span>오늘의 한 줄 조언</span>
      <p id="finalAdvice"></p>
    </div>

  </section>

</main>

<script src="./app.js?v=70"></script>

</body>
</html>
