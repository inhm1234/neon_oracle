  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>오늘의 운세코드 V6.5</title>

  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="./style.css?v=65"/>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="background-glow"></div>
<div id="screenFlash"></div>

<div id="legendaryGate" class="legendary-gate hidden" style="display: none;">
  <div class="legendary-gate-box">
    <div class="legendary-alert">특별한 운세 신호가 감지되었습니다</div>
    <div id="legendaryGateTitle" class="legendary-gate-title">ORACLE BREACH</div>
    <div id="legendaryGateText" class="legendary-gate-text">
      숨겨진 운세 채널을 여는 중입니다
    </div>
  </div>
</div>

<main class="container">

  <div class="brand-label">NEON ORACLE SYSTEM</div>

  <h1 class="title" data-text="오늘의 운세코드">오늘의 운세코드</h1>

  <p class="subtitle">
    오늘 당신에게 필요한 신호를 조용히 해석합니다
  </p>

  <div class="stats-box">
    <div class="energy">
      운세 에너지: <span id="energy">0</span>%
    </div>

    <div class="corruption">
      현실 노이즈: <span id="corruption">0</span>%
    </div>
  </div>

  <button id="oracleBtn">오늘의 신호 보기</button>

  <div id="statusText" class="status-text">준비 완료</div>

  <div id="oracleCard" class="oracle-card hidden">

    <div class="card-top">
      <div id="rarity"></div>
      <div id="cardCode"></div>
    </div>

    <h2 id="cardName"></h2>

    <p id="oracleMessage"></p>

    <div id="hiddenMessage" class="hidden-message"></div>

    <div id="systemLog" class="system-log"></div>

  </div>

</main>

<script src="./app.js?v=65"></script>

</body>
</html>
