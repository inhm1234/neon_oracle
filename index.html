<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEON ORACLE</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00ffe1">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: radial-gradient(circle at top, #050816, #000);
      color: #00ffe1;
      text-align: center;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 60px;
      font-size: 2.5rem;
      text-shadow: 0 0 10px #00ffe1;
    }

    .card {
      margin: 20px auto;
      width: 90%;
      max-width: 400px;
      padding: 20px;
      border: 1px solid #00ffe1;
      border-radius: 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
    }

    button {
      background: transparent;
      border: 1px solid #00ffe1;
      color: #00ffe1;
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      box-shadow: 0 0 10px #00ffe1;
    }
  </style>
</head>

<body>

  <h1>NEON ORACLE</h1>

  <div class="card">
    <p id="moodText">오늘의 운세를 확인하세요</p>

    <button onclick="generate()">운세 생성</button>
    <button id="installBtn" style="display:none;">앱 설치</button>

    <p id="result"></p>
  </div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>

</body>
</html>
